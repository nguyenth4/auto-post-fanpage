<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Nhập — Auto Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: blobFloat 8s ease-in-out infinite;
      pointer-events: none;
    }
    .bg-blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #f59e0b, #d97706);
      top: -150px; left: -150px;
      animation-delay: 0s;
    }
    .bg-blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #1d4ed8, #7c3aed);
      bottom: -100px; right: -100px;
      animation-delay: 3s;
    }
    .bg-blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #059669, #0891b2);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation-delay: 6s;
    }

    @keyframes blobFloat {
      0%, 100% { transform: scale(1) translate(0, 0); }
      33% { transform: scale(1.05) translate(15px, -15px); }
      66% { transform: scale(0.95) translate(-10px, 10px); }
    }

    /* Card */
    .login-card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.05);
      animation: cardIn 0.5s ease forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo / icon */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(245,158,11,0.4);
      margin-bottom: 16px;
    }
    .logo-title {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.5px;
    }
    .logo-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #f1f5f9;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: #f59e0b;
      background: rgba(245,158,11,0.06);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
    }
    input::placeholder { color: #475569; }

    /* Button */
    .btn-login {
      width: 100%;
      padding: 15px;
      margin-top: 8px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(245,158,11,0.35);
    }
    .btn-login:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(245,158,11,0.45);
    }
    .btn-login:active { transform: translateY(0); }

    /* Alert */
    .alert {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.35);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 13.5px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="login-card">
    <div class="logo-wrap">
      <div class="logo-icon">🚀</div>
      <div class="logo-title">Auto Post Fanpage</div>
      <div class="logo-subtitle">Vui lòng đăng nhập để tiếp tục</div>
    </div>

    {% if error %}
    <div class="alert">
      <span>⚠️</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" name="email" placeholder="you@email.com" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login">Đăng nhập →</button>
    </form>

    <div style="margin-top: 14px; display: grid; gap: 10px;">
      {% if google_enabled %}
      <a href="/auth/google/login" class="btn-login" style="text-decoration:none; text-align:center; background: rgba(255,255,255,0.08); box-shadow:none; border: 1px solid rgba(255,255,255,0.12);">
        Đăng nhập bằng Google
      </a>
      {% endif %}
      {% if registration_enabled %}
      <div class="footer-text" style="margin-top: 0;">
        Chưa có tài khoản? <a href="/register" style="color:#f59e0b; text-decoration:none;">Đăng ký</a>
      </div>
      {% else %}
      <div class="footer-text" style="margin-top: 0;">
        Đăng ký tài khoản đang tắt (chế độ private).
      </div>
      {% endif %}
    </div>

    <div class="footer-text">Lung Linh Decor &copy; 2026</div>
  </div>
</body>
</html>
